 <!DOCTYPE html>
<html>
<head>
  <title>Gift Card Editor 💖</title>
  <style>
    body { text-align:center; background:#ffe6f0; }

    .card {
      position: relative;
      width: 300px;
      margin: auto;
    }

    .card img {
      width: 100%;
      border-radius: 15px;
    }

    .text {
      position: absolute;
      width: 100%;
      top: 40%;
      left: 50%;
      transform: translate(-50%, -50%);
      color: black;
      font-size: 18px;
      font-weight: bold;
    }
  </style>
</head>

<body>

<h1>Create Your Card 💌</h1>

<input type="text" id="name" placeholder="Name"><br><br>
<textarea id="msg" placeholder="Message"></textarea><br><br>

<button onclick="updateCard()">Update Card</button>

<div class="card">
  <img src="card1.png" id="cardImg">
  <div class="text" id="output"></div>
</div>

<script>
function updateCard(){
  let name = document.getElementById("name").value;
  let msg = document.getElementById("msg").value;

  document.getElementById("output").innerHTML =
    "For " + name + "<br>" + msg;
}
</script>

</body>
</html>
