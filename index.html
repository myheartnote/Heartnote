<!DOCTYPE html>
<html>
<head>
<title>Heartnote 💖</title>

<style>
body {
  text-align: center;
  background: linear-gradient(to bottom, #ffd6e0, #fff0f5);
  font-family: 'Segoe UI', sans-serif;
}

h1 {
  color: #ff4d88;
}

input, textarea {
  padding: 10px;
  margin: 5px;
  border-radius: 10px;
  border: none;
  width: 220px;
}

button {
  padding: 10px 20px;
  border-radius: 20px;
  border: none;
  background: #ff4d88;
  color: white;
}

.card {
  position: relative;
  width: 300px;
  margin: 20px auto;
}

.card img {
  width: 100%;
  border-radius: 20px;
}

.text {
  position: absolute;
  width: 80%;
  top: 40%;
  left: 50%;
  transform: translate(-50%, -50%);
  color: #333;
  font-weight: bold;
}
</style>
</head>

<body>

<h1>Create Your Card 💌</h1>

<input id="name" placeholder="Name"><br>
<textarea id="msg" placeholder="Message"></textarea><br>
<button onclick="updateCard()">Update Card</button>

<div class="card">
  <img src="https://i.imgur.com/8Km9tLL.png">
  <div class="text">
    <p id="displayName">For 💖</p>
    <p id="displayMsg">Your message...</p>
  </div>
</div>

<script>
function updateCard() {
  document.getElementById("displayName").innerText =
    "For " + document.getElementById("name").value;

  document.getElementById("displayMsg").innerText =
    document.getElementById("msg").value;
}
</script>

</body>
</html>
